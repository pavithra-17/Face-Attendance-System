<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Registration Matrix</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#121212] text-gray-100 min-h-screen flex items-center justify-center font-sans">

    <div class="w-full max-w-lg p-6 bg-[#1e1e1e] border border-gray-800 rounded-2xl shadow-2xl">
        <h2 class="text-xl font-bold text-center text-white mb-6 tracking-wide">STUDENT PROFILE ENROLLMENT</h2>
        
        <div class="space-y-4">
            <div>
                <label class="block text-xs font-semibold tracking-wider text-gray-500 uppercase mb-1.5">Full Legal Name</label>
                <input type="text" id="studName" placeholder="Enter full name (eg: Neha Sharma)..." class="w-full px-4 py-3 bg-[#161616] border border-gray-800 rounded-xl text-white placeholder-gray-600 focus:outline-none focus:border-blue-500/50 focus:ring-2 focus:ring-blue-500/10 transition-all duration-200 text-sm">
            </div>

            <div>
                <label class="block text-xs font-semibold tracking-wider text-gray-500 uppercase mb-1.5">Official Email ID</label>
                <input type="email" id="studEmail" placeholder="Enter student email address..." class="w-full px-4 py-3 bg-[#161616] border border-gray-800 rounded-xl text-white placeholder-gray-600 focus:outline-none focus:border-blue-500/50 focus:ring-2 focus:ring-blue-500/10 transition-all duration-200 text-sm">
            </div>

            <div>
                <label class="block text-xs font-semibold tracking-wider text-gray-500 uppercase mb-1.5">Biometric Profile Feed</label>
                <div class="relative aspect-video bg-black rounded-xl overflow-hidden border border-gray-800">
                    <video id="regCam" autoplay playsinline class="w-full h-full object-cover transform -scale-x-100"></video>
                    <canvas id="regCanvas" class="hidden"></canvas>
                </div>
            </div>

            <button onclick="submitRegistration()" class="w-full mt-2 py-3.5 bg-blue-600 text-white font-bold rounded-xl shadow-lg shadow-blue-600/20 hover:bg-blue-500 hover:shadow-blue-500/30 active:scale-[0.99] transition-all duration-150">
                REGISTER BIOMETRIC IDENTITY PROFILE
            </button>
            
            <div class="text-center pt-2">
                <a href="/" class="text-xs font-semibold text-gray-500 hover:text-gray-400 transition-colors">← Cancel and Exit Registration</a>
            </div>
        </div>
    </div>

    <script>
        const video = document.getElementById('regCam');
        const canvas = document.getElementById('regCanvas');

        navigator.mediaDevices.getUserMedia({ video: true })
            .then(stream => { video.srcObject = stream; })
            .catch(err => { alert("Webcam stream block confirmation error: " + err); });

        function submitRegistration() {
            let name = document.getElementById('studName').value.trim();
            let email = document.getElementById('studEmail').value.trim();
            
            if(!name || !email) { alert("Please complete both form entry parameters."); return; }

            const context = canvas.getContext('2d');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            context.drawImage(video, 0, 0, canvas.width, canvas.height);
            const dataUrl = canvas.toDataURL('image/jpeg');

            fetch('/api/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name: name, email: email, image: dataUrl })
            })
            .then(res => res.json())
            .then(data => {
                alert(data.message);
                if(data.success) window.location.href = "/";
            });
        }
    </script>
</body>
</html>
