<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attendance Web Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#121212] text-gray-100 min-h-screen flex items-center justify-center font-sans antialiased">

    <div class="w-full max-w-md p-8 mx-4 bg-[#1e1e1e] border border-gray-800 rounded-2xl shadow-2xl transition-all duration-300 hover:border-emerald-500/30">
        <div class="mb-8 text-center">
            <div class="inline-flex items-center justify-center w-16 h-16 mb-4 rounded-full bg-emerald-500/10 text-emerald-400">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-8 h-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z" />
                </svg>
            </div>
            <h2 class="text-2xl font-bold tracking-tight text-white">ATTENDANCE WORKSPACE</h2>
            <p class="mt-2 text-sm text-gray-400">Secure Biometric Face Verification Portal</p>
        </div>

        <div class="space-y-4">
            <button onclick="window.location.href='/login-page'" class="w-full py-3.5 px-4 font-semibold text-white bg-emerald-600 rounded-xl shadow-lg shadow-emerald-600/20 hover:bg-emerald-500 hover:shadow-emerald-500/30 active:scale-[0.98] transition-all duration-200">
                STUDENT LOGIN (FACE SCAN)
            </button>
            <button onclick="window.location.href='/register-page'" class="w-full py-3.5 px-4 font-semibold text-emerald-400 bg-emerald-500/5 border border-emerald-500/20 rounded-xl hover:bg-emerald-500/10 active:scale-[0.98] transition-all duration-200">
                NEW STUDENT REGISTRATION
            </button>
        </div>

        <div class="relative flex py-6 items-center">
            <div class="flex-grow border-t border-gray-800"></div>
            <span class="flex-shrink mx-4 text-xs font-semibold tracking-wider text-gray-600 uppercase">TEACHER PANEL</span>
            <div class="flex-grow border-t border-gray-800"></div>
        </div>

        <div class="space-y-3">
            <input type="email" id="teacherEmail" placeholder="Enter administrative email id..." class="w-full px-4 py-3 bg-[#161616] border border-gray-800 rounded-xl text-white placeholder-gray-600 focus:outline-none focus:border-rose-500/50 focus:ring-2 focus:ring-rose-500/10 transition-all duration-200 text-sm">
            <button onclick="loginTeacher()" class="w-full py-3 px-4 font-semibold text-white bg-rose-600 rounded-xl shadow-lg shadow-rose-600/20 hover:bg-rose-500 hover:shadow-rose-500/30 active:scale-[0.98] transition-all duration-200 text-sm">
                LOG IN AS TEACHER
            </button>
        </div>
    </div>

    <script>
        function loginTeacher() {
            let email = document.getElementById('teacherEmail').value;
            fetch('/api/teacher-login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email: email })
            })
            .then(res => res.json())
            .then(data => {
                if(data.success) window.location.href = data.redirect;
                else alert(data.message);
            });
        }
    </script>
</body>
</html>
