<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Face Check-In</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Pulse Animation for Scanning Ring */
        @keyframes pulse-ring {
            0% { transform: translate(-50%, -50%) scale(0.98); opacity: 0.5; }
            50% { transform: translate(-50%, -50%) scale(1.02); opacity: 0.8; }
            100% { transform: translate(-50%, -50%) scale(0.98); opacity: 0.5; }
        }
        .scanner-overlay { animation: pulse-ring 3s infinite ease-in-out; }
    </style>
</head>
<body class="bg-[#121212] text-gray-100 min-h-screen flex flex-col items-center justify-center font-sans">

    <div class="w-full max-w-xl p-6 bg-[#1e1e1e] border border-gray-800 rounded-2xl shadow-2xl text-center relative overflow-hidden">
        
        <div id="loadingOverlay" class="absolute inset-0 bg-black/80 flex flex-col items-center justify-center z-50 hidden transition-all duration-200">
            <div class="w-12 h-12 border-4 border-emerald-500 border-t-transparent rounded-full animate-spin mb-4"></div>
            <p class="text-sm font-semibold tracking-wide text-emerald-400">PROCESSING FACIAL GEOMETRY...</p>
        </div>

        <h2 class="text-xl font-bold text-white mb-4 tracking-wide">BIOMETRIC FACE SCANNER</h2>
        
        <div class="relative w-full aspect-video bg-black rounded-xl overflow-hidden mb-5 border border-gray-800">
            <video id="webcam" autoplay playsinline class="w-full h-full object-cover transform -scale-x-100"></video>
            <canvas id="canvas" class="hidden"></canvas>
            
            <div class="scanner-overlay absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-48 h-64 border-2 border-dashed border-emerald-400/60 rounded-[50%] bg-emerald-500/5 pointer-events-none"></div>
        </div>

        <div id="statusBox" class="p-3 mb-5 bg-[#161616] border border-gray-800 rounded-xl text-sm font-medium text-gray-400">
            Align your face inside the target guideline ring area
        </div>

        <button onclick="scanFace()" class="w-full py-3.5 bg-emerald-600 text-white font-bold rounded-xl shadow-lg shadow-emerald-600/20 hover:bg-emerald-500 hover:shadow-emerald-500/30 active:scale-[0.99] transition-all duration-150">
            VERIFY IDENTITY & CHECK IN
        </button>

        <div class="mt-4">
            <a href="/" class="text-xs font-semibold text-gray-500 hover:text-gray-400 transition-colors">← Cancel and Back to Dashboard</a>
        </div>
    </div>

    <script>
        const video = document.getElementById('webcam');
        const canvas = document.getElementById('canvas');
        const statusBox = document.getElementById('statusBox');
        const loadingOverlay = document.getElementById('loadingOverlay');

        navigator.mediaDevices.getUserMedia({ video: true })
            .then(stream => { video.srcObject = stream; })
            .catch(err => { statusBox.innerText = "Camera initialization blocked: " + err; });

        function scanFace() {
            // Show Loading Spinner Frame
            loadingOverlay.classList.remove('hidden');
            
            const context = canvas.getContext('2d');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            context.drawImage(video, 0, 0, canvas.width, canvas.height);
            const dataUrl = canvas.toDataURL('image/jpeg');

            fetch('/api/verify-face', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ image: dataUrl })
            })
            .then(res => res.json())
            .then(data => {
                // Hide Loading Spinner Frame
                loadingOverlay.classList.add('hidden');
                
                if(data.success) {
                    statusBox.className = "p-3 mb-5 bg-emerald-500/10 border border-emerald-500/30 rounded-xl text-sm font-semibold text-emerald-400";
                    statusBox.innerHTML = `✔️ ACCESS GRANTED: Welcome ${data.name}! (${data.status})`;
                } else {
                    statusBox.className = "p-3 mb-5 bg-rose-500/10 border border-rose-500/30 rounded-xl text-sm font-semibold text-rose-400";
                    statusBox.innerText = `❌ ${data.message}`;
                }
            })
            .catch(() => {
                loadingOverlay.classList.add('hidden');
                statusBox.innerText = "Network transmission error.";
            });
        }
    </script>
</body>
</html>
